name: SpillhistorieApp
options:
  bundleIdPrefix: no.jonh
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "2"   # iPad only
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: no.jonh.spillhistorie
    INFOPLIST_FILE: Sources/SpillhistorieApp/Info.plist
    DEVELOPMENT_TEAM: ""

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    minorVersion: "2.7.0"
  FeedKit:
    url: https://github.com/nmdias/FeedKit.git
    minorVersion: "9.1.2"

targets:
  SpillhistorieApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/SpillhistorieApp
        excludes: []
    resources:
      - path: Sources/SpillhistorieApp/Assets.xcassets
    info:
      path: Sources/SpillhistorieApp/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: false
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            spillhistorie.no:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
        CFBundleDisplayName: Spillhistorie
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    dependencies:
      - package: SwiftSoup
      - package: FeedKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
